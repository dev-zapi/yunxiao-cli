name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive-name: yunxiao-cli-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive-name: yunxiao-cli-linux-arm64
          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            archive-name: yunxiao-cli-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            archive-name: yunxiao-cli-darwin-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Unix)
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/yunxiao-cli dist/
          cd dist
          tar -czf ${{ matrix.archive-name }}.tar.gz yunxiao-cli
          echo "ASSET_PATH=dist/${{ matrix.archive-name }}.tar.gz" >> $GITHUB_ENV
          echo "ASSET_NAME=${{ matrix.archive-name }}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive-name }}
          path: dist/${{ matrix.archive-name }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
